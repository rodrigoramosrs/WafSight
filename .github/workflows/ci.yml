name: Build, Test & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/index.json'
  pull_request:

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate version
        id: version
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date -u +%-m)

          EXISTING=$(gh release list --limit 100 --json tagName |
            jq -r --arg year "$YEAR" --arg month "$MONTH" '.[] | select(.tagName | test("^" + $year + "." + $month + "\\.\\d+\\.\\d+$")) | .tagName' |
            sort -V | tail -1)

          if [ -z "$EXISTING" ]; then
            MINOR=1
          else
            PREVIOUS_MINOR=$(echo "$EXISTING" | awk -F. '{print $4}')
            MINOR=$((PREVIOUS_MINOR + 1))
          fi

          VERSION="$YEAR.$MONTH.0.$MINOR"
          echo "Computed version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: calculate-version
    runs-on: windows-latest
    outputs:
      version: ${{ needs.calculate-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore -p:Version=${{ needs.calculate-version.outputs.version }}

      - name: Test
        run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger trx --results-directory test-results -p:Version=${{ needs.calculate-version.outputs.version }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/**/*.trx

  publish-nuget:
    needs: [calculate-version, build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Pack NuGet
        run: dotnet pack src/WafSight/WafSight.csproj --configuration ${{ env.CONFIGURATION }} -p:Version=${{ needs.calculate-version.outputs.version }} -o nupkg

      - name: List packed files
        run: ls -la nupkg/

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push nupkg/WafSight.${{ needs.calculate-version.outputs.version }}.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload nupkg to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkg/*.nupkg

  publish-release:
    needs: [calculate-version, build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: github-release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Publish win-x64
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r win-x64 \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:Aot=true \
            -p:StripSymbols=true \
            -p:IlcFoldIdenticalMethodBodies=true \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/win-x64
          mv publish/win-x64/WafSight.Cli.exe publish/win-x64/wafsight.exe
          mv publish/win-x64/WafSight.Cli.pdb publish/win-x64/wafsight.pdb 2>/dev/null || true
          echo "Publish win-x64 artifacts:"
          ls -la publish/win-x64/

      - name: Publish linux-x64
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r linux-x64 \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:Aot=true \
            -p:StripSymbols=true \
            -p:IlcFoldIdenticalMethodBodies=true \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/linux-x64
          mv publish/linux-x64/WafSight.Cli publish/linux-x64/wafsight
          echo "Publish linux-x64 artifacts:"
          ls -la publish/linux-x64/

      - name: Publish osx-x64
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r osx-x64 \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:Aot=true \
            -p:StripSymbols=true \
            -p:IlcFoldIdenticalMethodBodies=true \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/osx-x64
          mv publish/osx-x64/WafSight.Cli publish/osx-x64/wafsight
          echo "Publish osx-x64 artifacts:"
          ls -la publish/osx-x64/

      - name: Publish osx-arm64
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r osx-arm64 \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:Aot=true \
            -p:StripSymbols=true \
            -p:IlcFoldIdenticalMethodBodies=true \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/osx-arm64
          mv publish/osx-arm64/WafSight.Cli publish/osx-arm64/wafsight
          echo "Publish osx-arm64 artifacts:"
          ls -la publish/osx-arm64/

      - name: Package win-x64
        run: |
          set -e
          zip -r ../../../WafSight-win-x64.zip ./publish/win-x64/wafsight.exe
          echo "Package win-x64 created:"
          ls -la WafSight-win-x64.zip

      - name: Package linux-x64
        run: |
          set -e
          tar -czf WafSight-linux-x64.tar.gz -C publish/linux-x64 wafsight
          echo "Package linux-x64 created:"
          ls -la WafSight-linux-x64.tar.gz

      - name: Package osx-x64
        run: |
          set -e
          tar -czf WafSight-osx-x64.tar.gz -C publish/osx-x64 wafsight
          echo "Package osx-x64 created:"
          ls -la WafSight-osx-x64.tar.gz

      - name: Package osx-arm64
        run: |
          set -e
          tar -czf WafSight-osx-arm64.tar.gz -C publish/osx-arm64 wafsight
          echo "Package osx-arm64 created:"
          ls -la WafSight-osx-arm64.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.calculate-version.outputs.version }}
          name: Release v${{ needs.calculate-version.outputs.version }}
          body: |
            ## WafSight v${{ needs.calculate-version.outputs.version }}

            ### Binários disponíveis (AOT Native, autocontidos):
            - **Windows x64** — `WafSight-win-x64.zip`
            - **Linux x64** — `WafSight-linux-x64.tar.gz`
            - **macOS x64** — `WafSight-osx-x64.tar.gz`
            - **macOS ARM64** — `WafSight-osx-arm64.tar.gz`

            ### Instalação
            ```bash
            # Linux / macOS
            tar -xzf WafSight-linux-x64.tar.gz
            chmod +x wafsight
            ./wafsight detect https://example.com

            # Windows (PowerShell)
            Expand-Archive WafSight-win-x64.zip -DestinationPath .
            .\\wafsight.exe detect https://example.com
            ```

            ### NuGet (biblioteca .NET)
            ```bash
            dotnet add package WafSight --version ${{ needs.calculate-version.outputs.version }}
            ```
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            WafSight-win-x64.zip
            WafSight-linux-x64.tar.gz
            WafSight-osx-x64.tar.gz
            WafSight-osx-arm64.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            WafSight-win-x64.zip
            WafSight-linux-x64.tar.gz
            WafSight-osx-x64.tar.gz
            WafSight-osx-arm64.tar.gz
