name: Build, Test & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/index.json'
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip-release: ${{ steps.changes.outputs.code_changed == 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changes
        run: |
          export GH_TOKEN=$GITHUB_TOKEN
          
          LAST_RELEASE_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          
          if [ -n "$LAST_RELEASE_TAG" ]; then
            CHANGED_FILES=$(git diff --name-only "${LAST_RELEASE_TAG}...HEAD" -- "*.cs" "*.csproj" "*.yml" "*.yaml" "*.ps1" "*.sh" "Directory.Build.props" 2>/dev/null)
          else
            CHANGED_FILES=$(git diff --name-only "HEAD~1...HEAD" -- "*.cs" "*.csproj" "*.yml" "*.yaml" "*.ps1" "*.sh" "Directory.Build.props" 2>/dev/null)
          fi

          CODE_CHANGED=false
          if [ -n "$CHANGED_FILES" ]; then
            echo "Changed files:"
            echo "$CHANGED_FILES"
            CODE_CHANGED=true
          else
            echo "No code changes detected. Skipping release."
          fi

          echo "code_changed=$CODE_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Calculate version
        id: version
        if: steps.changes.outputs.code_changed == 'true'
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)

          EXISTING=$(gh release list --limit 100 --json tagName |
            jq -r --arg year "$YEAR" --arg month "$MONTH" --arg day "$DAY" '.[] | select(.tagName | test("^v?" + $year + "\\." + $month + "\\." + $day + "\\.\\d+$")) | .tagName' |
            sort -V | tail -1)

          if [ -z "$EXISTING" ]; then
            BUILD=1
          else
            PREVIOUS_BUILD=$(echo "$EXISTING" | sed 's/^v//' | awk -F. '{print $4}')
            BUILD=$((PREVIOUS_BUILD + 1))
          fi

          VERSION="$YEAR.$MONTH.$DAY.$BUILD"
          echo "Computed version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: [calculate-version]
    if: needs.calculate-version.outputs.skip_release == 'false'
    runs-on: windows-latest
    outputs:
      version: ${{ needs.calculate-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore -p:Version=${{ needs.calculate-version.outputs.version }}

      - name: Test
        run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger trx --results-directory test-results -p:Version=${{ needs.calculate-version.outputs.version }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/**/*.trx

  publish-nuget:
    needs: [calculate-version, build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.calculate-version.outputs.skip_release == 'false'
    environment: production
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Pack NuGet
        run: dotnet pack src/WafSight/WafSight.csproj --configuration ${{ env.CONFIGURATION }} -p:Version=${{ needs.calculate-version.outputs.version }} -o nupkg

      - name: List packed files
        run: ls -la nupkg/

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push nupkg/WafSight.${{ needs.calculate-version.outputs.version }}.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push nupkg/WafSight.${{ needs.calculate-version.outputs.version }}.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/rodrigoramosrs/index.json \
            --skip-duplicate

      - name: Upload nupkg to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkg/*.nupkg

  publish-win-x64:
    needs: [calculate-version, build-and-test]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.calculate-version.outputs.skip_release == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Publish win-x64 (AOT Self-Contained)
        shell: pwsh
        run: |
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj `
            -c ${{ env.CONFIGURATION }} `
            -r win-x64 `
            -p:SelfContained=true `
            -p:PublishSingleFile=true `
            -p:Aot=true `
            -p:StripSymbols=true `
            -p:IlcFoldIdenticalMethodBodies=true `
            -p:Version=${{ needs.calculate-version.outputs.version }} `
            -o publish/win-x64-aot
          Rename-Item publish/win-x64-aot/WafSight.Cli.exe wafsight.exe -Force
          if (Test-Path publish/win-x64-aot/WafSight.Cli.pdb) {
            Rename-Item publish/win-x64-aot/WafSight.Cli.pdb wafsight.pdb -Force
          }

      - name: Publish win-x64 (Framework Dependent)
        shell: pwsh
        run: |
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj `
            -c ${{ env.CONFIGURATION }} `
            -r win-x64 `
            -p:SelfContained=false `
            -p:Version=${{ needs.calculate-version.outputs.version }} `
            -o publish/win-x64-fx
          Rename-Item publish/win-x64-fx/WafSight.Cli.exe wafsight.exe -Force

      - name: Package win-x64 (AOT)
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64-aot/wafsight.exe -DestinationPath WafSight-win-x64.zip -Force

      - name: Package win-x64 (Framework Dependent)
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64-fx/* -DestinationPath WafSight-win-x64-framework.zip -Force

      - name: Upload win-x64 AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-win-x64
          path: WafSight-win-x64.zip

      - name: Upload win-x64 Framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-win-x64-framework
          path: WafSight-win-x64-framework.zip

  publish-linux-x64:
    needs: [calculate-version, build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.calculate-version.outputs.skip_release == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Publish linux-x64 (AOT Self-Contained)
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r linux-x64 \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:Aot=true \
            -p:StripSymbols=true \
            -p:IlcFoldIdenticalMethodBodies=true \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/linux-x64-aot
          mv publish/linux-x64-aot/WafSight.Cli publish/linux-x64-aot/wafsight

      - name: Publish linux-x64 (Framework Dependent)
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r linux-x64 \
            -p:SelfContained=false \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/linux-x64-fx
          mv publish/linux-x64-fx/WafSight.Cli publish/linux-x64-fx/wafsight

      - name: Package linux-x64 (AOT)
        run: tar -czf WafSight-linux-x64.tar.gz -C publish/linux-x64-aot wafsight

      - name: Package linux-x64 (Framework Dependent)
        run: tar -czf WafSight-linux-x64-framework.tar.gz -C publish/linux-x64-fx .

      - name: Upload linux-x64 AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-linux-x64
          path: WafSight-linux-x64.tar.gz

      - name: Upload linux-x64 Framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-linux-x64-framework
          path: WafSight-linux-x64-framework.tar.gz

  publish-osx-x64:
    needs: [calculate-version, build-and-test]
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.calculate-version.outputs.skip_release == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Publish osx-x64 (AOT Self-Contained)
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r osx-x64 \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:Aot=true \
            -p:StripSymbols=true \
            -p:IlcFoldIdenticalMethodBodies=true \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/osx-x64-aot
          mv publish/osx-x64-aot/WafSight.Cli publish/osx-x64-aot/wafsight

      - name: Publish osx-x64 (Framework Dependent)
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r osx-x64 \
            -p:SelfContained=false \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/osx-x64-fx
          mv publish/osx-x64-fx/WafSight.Cli publish/osx-x64-fx/wafsight

      - name: Package osx-x64 (AOT)
        run: tar -czf WafSight-osx-x64.tar.gz -C publish/osx-x64-aot wafsight

      - name: Package osx-x64 (Framework Dependent)
        run: tar -czf WafSight-osx-x64-framework.tar.gz -C publish/osx-x64-fx .

      - name: Upload osx-x64 AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-osx-x64
          path: WafSight-osx-x64.tar.gz

      - name: Upload osx-x64 Framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-osx-x64-framework
          path: WafSight-osx-x64-framework.tar.gz

  publish-osx-arm64:
    needs: [calculate-version, build-and-test]
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.calculate-version.outputs.skip_release == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Publish osx-arm64 (AOT Self-Contained)
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r osx-arm64 \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:Aot=true \
            -p:StripSymbols=true \
            -p:IlcFoldIdenticalMethodBodies=true \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/osx-arm64-aot
          mv publish/osx-arm64-aot/WafSight.Cli publish/osx-arm64-aot/wafsight

      - name: Publish osx-arm64 (Framework Dependent)
        run: |
          set -e
          dotnet publish src/WafSight.Cli/WafSight.Cli.csproj \
            -c ${{ env.CONFIGURATION }} \
            -r osx-arm64 \
            -p:SelfContained=false \
            -p:Version=${{ needs.calculate-version.outputs.version }} \
            -o publish/osx-arm64-fx
          mv publish/osx-arm64-fx/WafSight.Cli publish/osx-arm64-fx/wafsight

      - name: Package osx-arm64 (AOT)
        run: tar -czf WafSight-osx-arm64.tar.gz -C publish/osx-arm64-aot wafsight

      - name: Package osx-arm64 (Framework Dependent)
        run: tar -czf WafSight-osx-arm64-framework.tar.gz -C publish/osx-arm64-fx .

      - name: Upload osx-arm64 AOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-osx-arm64
          path: WafSight-osx-arm64.tar.gz

      - name: Upload osx-arm64 Framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: wafsight-osx-arm64-framework
          path: WafSight-osx-arm64-framework.tar.gz

  create-release:
    needs:
      - calculate-version
      - build-and-test
      - publish-win-x64
      - publish-linux-x64
      - publish-osx-x64
      - publish-osx-arm64
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.calculate-version.outputs.skip_release == 'false'
    environment: github-release
    permissions:
      contents: write
    steps:
      - name: Download publish artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wafsight-*
          merge-multiple: true

      - name: Remove non-binary files
        run: find artifacts/ -type f \( -name '*.trx' -o -name '*.snupkg' -o -name '*.nupkg' \) -delete

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.calculate-version.outputs.version }}
          name: Release v${{ needs.calculate-version.outputs.version }}
          body: |
            ## WafSight v${{ needs.calculate-version.outputs.version }}

            ### Binários AOT (autocontidos, sem dependências):
            - **Windows x64** — `WafSight-win-x64.zip`
            - **Linux x64** — `WafSight-linux-x64.tar.gz`
            - **macOS x64** — `WafSight-osx-x64.tar.gz`
            - **macOS ARM64** — `WafSight-osx-arm64.tar.gz`

            ### Binários Framework Dependent (requer .NET 10 Runtime):
            - **Windows x64** — `WafSight-win-x64-framework.zip`
            - **Linux x64** — `WafSight-linux-x64-framework.tar.gz`
            - **macOS x64** — `WafSight-osx-x64-framework.tar.gz`
            - **macOS ARM64** — `WafSight-osx-arm64-framework.tar.gz`

            ### Instalação (AOT)
            ```bash
            # Linux / macOS
            tar -xzf WafSight-linux-x64.tar.gz
            chmod +x wafsight
            ./wafsight detect https://example.com

            # Windows (PowerShell)
            Expand-Archive WafSight-win-x64.zip -DestinationPath .
            .\\wafsight.exe detect https://example.com
            ```

            ### Instalação (Framework Dependent)
            ```bash
            # Install .NET 10 Runtime first: https://dot.net
            # Linux / macOS
            tar -xzf WafSight-linux-x64-framework.tar.gz
            chmod +x wafsight
            ./wafsight detect https://example.com

            # Windows (PowerShell)
            Expand-Archive WafSight-win-x64-framework.zip -DestinationPath .
            .\\wafsight.exe detect https://example.com
            ```

            ### NuGet (biblioteca .NET)
            ```bash
            dotnet add package WafSight --version ${{ needs.calculate-version.outputs.version }}
            ```
          generate_release_notes: true
          draft: false
          prerelease: false
          files: artifacts/*
