name: Sync dev with main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset dev branch to main
        run: |
          git branch -f dev origin/main
          git push origin dev --force
