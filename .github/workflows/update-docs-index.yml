name: Update Docs Index

on:
  push:
    branches-ignore: [main]
    paths:
      - 'docs/*.md'
      - 'docs/generate-index.sh'
      - '!docs/index.json'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate docs/index.json
        run: bash docs/generate-index.sh > docs/index.json

      - name: Commit and push
        run: |
          if [ -z "$(git diff docs/index.json)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.json
          git commit -m "docs: update documentation index.json [skip ci]"
          git push
