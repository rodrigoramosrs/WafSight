name: Update Docs Index

on:
  push:
    branches: [main]
    paths:
      - 'docs/*.md'
      - 'docs/generate-index.sh'
      - '!docs/index.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate docs/index.json
        run: bash docs/generate-index.sh > docs/index.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: update index.json [skip ci]"
          title: "docs: update index.json"
          body: "Automated update of docs/index.json after documentation changes."
          branch: docs/update-index
          delete-branch: true
